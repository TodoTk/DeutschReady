<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PrufReady – Modül Alıştırması</title>
<link rel="icon" type="image/png" href="logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Dancing+Script:wght@600&family=Playfair+Display:wght@700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181c2a;
    --surface:#222840;
    --surface2:#2c3250;
    --surface3:#353d5e;
    --accent:#7aabff;
    --accent2:#9d7dff;
    --green:#34d672;
    --red:#ff7070;
    --yellow:#fbbf24;
    --text:#f2f4fc;
    --muted:#b0b8d8;
    --border:#404870;
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.7;}
  a{color:inherit;text-decoration:none;}
  select,option{color:#1a1a2e;background:#f0f2ff;}
  header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(24,28,42,.97);position:sticky;top:0;z-index:100;}
  .logo{font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .back-link{font-size:.85rem;color:var(--muted);}
  .back-link:hover{color:var(--accent);}
  .mode-banner{padding:.45rem 2rem;font-size:.78rem;text-align:center;font-weight:700;}
  .mode-study{background:rgba(52,214,114,.12);color:var(--green);border-bottom:1px solid rgba(52,214,114,.25);}
  .mode-exam{background:rgba(122,171,255,.1);color:var(--accent);border-bottom:1px solid rgba(122,171,255,.25);}
  .wrap{max-width:1360px;margin:0 auto;padding:2rem;}
  .exam-header{text-align:center;margin-bottom:2rem;}
  .badge{display:inline-block;background:rgba(122,171,255,.18);border:1px solid rgba(122,171,255,.4);color:var(--accent);border-radius:20px;padding:.3rem .9rem;font-size:.78rem;font-weight:700;margin-bottom:.8rem;}
  h1{font-size:clamp(1.4rem,3.5vw,2rem);font-weight:900;margin-bottom:.3rem;}
  .progress-bar{background:var(--surface3);border-radius:6px;height:8px;margin-bottom:.3rem;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .4s;}
  .progress-label{font-size:.76rem;color:var(--muted);text-align:right;margin-bottom:1.5rem;}
  .section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.8rem;margin-bottom:1.2rem;}
  .section-tag{display:inline-block;background:rgba(122,171,255,.15);border:1px solid rgba(122,171,255,.35);color:var(--accent);border-radius:6px;padding:.2rem .7rem;font-size:.72rem;font-weight:700;margin-bottom:.8rem;letter-spacing:.04em;}
  h2{font-size:1rem;font-weight:800;margin-bottom:.3rem;}
  .instr{font-size:.86rem;color:var(--muted);margin-bottom:1.2rem;line-height:1.6;}
  .text-block{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:1rem 1.1rem;margin-bottom:.9rem;font-size:.9rem;white-space:pre-wrap;color:var(--text);line-height:1.75;}
  /* Zuordnung */
  .match-row{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:.7rem;flex-wrap:wrap;padding:.6rem .8rem;background:var(--surface2);border-radius:8px;}
  .match-num{font-size:.85rem;font-weight:800;color:var(--accent);min-width:28px;padding-top:.3rem;}
  .match-text{flex:1;font-size:.88rem;min-width:200px;color:var(--text);line-height:1.6;}
  .match-sel{background:#f0f2ff;border:2px solid var(--border);color:#1a1a2e;border-radius:7px;padding:.4rem .7rem;font-size:.84rem;outline:none;cursor:pointer;min-width:180px;font-weight:600;}
  .match-sel:focus{border-color:var(--accent);}
  .match-sel.correct{border-color:var(--green);background:#dcfce7;color:#166534;}
  .match-sel.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b;}
  .headings-ref{background:var(--surface2);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:1.1rem;border:1px solid var(--border);}
  .headings-ref p{font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em;}
  /* Anzeigen */
  .anzeige-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.6rem;margin-bottom:1.1rem;}
  .anzeige-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;font-size:.85rem;color:var(--text);line-height:1.6;}
  .anzeige-label{font-size:.75rem;font-weight:800;color:var(--accent);margin-bottom:.3rem;text-transform:uppercase;}
  /* MC */
  .mc-q{font-size:.92rem;font-weight:700;margin-bottom:.6rem;color:var(--text);}
  .mc-options{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem;}
  .mc-opt{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem .85rem;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-size:.87rem;color:var(--muted);background:var(--surface2);width:100%;text-align:left;transition:all .15s;}
  .mc-opt:hover{border-color:var(--accent);color:var(--text);background:var(--surface3);}
  .mc-opt.selected{border-color:var(--accent);color:var(--text);background:rgba(122,171,255,.15);}
  .mc-opt.correct{border-color:var(--green)!important;color:var(--green)!important;background:rgba(52,214,114,.12)!important;}
  .mc-opt.wrong{border-color:var(--red)!important;color:var(--red)!important;background:rgba(255,112,112,.12)!important;}
  /* SPB inline */
  .spb-text{font-size:.93rem;line-height:2.4;color:var(--text);}
  .gap-sel{background:#f0f2ff;border:2px solid var(--accent);color:#1a1a2e;border-radius:6px;padding:.2rem .5rem;font-size:.85rem;outline:none;cursor:pointer;vertical-align:middle;margin:0 .2rem;font-weight:600;}
  .gap-sel:focus{border-color:var(--accent2);}
  .gap-sel.correct{border-color:var(--green);background:#dcfce7;color:#166534;}
  .gap-sel.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b;}
  /* SPB T2 */
  .spb2-opts{background:var(--surface2);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:1.1rem;border:1px solid var(--border);}
  .spb2-opts p{font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em;}
  .spb2-q-row{display:flex;align-items:center;gap:.8rem;padding:.5rem 0;border-bottom:1px solid var(--border);}
  .spb2-q-row:last-child{border-bottom:none;}
  .spb2-qnum{font-size:.85rem;font-weight:800;color:var(--accent);min-width:36px;}
  .spb2-qt{flex:1;font-size:.87rem;color:var(--text);}
  .spb2-sel{background:#f0f2ff;border:2px solid var(--border);color:#1a1a2e;border-radius:7px;padding:.38rem .6rem;font-size:.82rem;outline:none;min-width:140px;font-weight:600;cursor:pointer;}
  .spb2-sel:focus{border-color:var(--accent);}
  .spb2-sel.correct{border-color:var(--green);background:#dcfce7;color:#166534;}
  .spb2-sel.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b;}
  /* HSV — audio + Richtig/Falsch */
  .audio-block{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .audio-label{font-size:.78rem;font-weight:700;color:var(--accent);white-space:nowrap;}
  .audio-block audio{flex:1;min-width:220px;height:38px;}
  .hsv-q{padding:.8rem 0;border-bottom:1px solid var(--border);}
  .hsv-q:last-child{border-bottom:none;}
  .hsv-btn{padding:.45rem 1rem;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;}
  .hsv-btn:hover{border-color:var(--accent);color:var(--text);}
  .hsv-btn.sel-r{border-color:var(--accent);color:var(--accent);background:rgba(122,171,255,.12);}
  .hsv-btn.sel-f{border-color:var(--red);color:var(--red);background:rgba(255,112,112,.1);}
  .hsv-btn.correct{border-color:var(--green)!important;color:var(--green)!important;background:rgba(52,214,114,.12)!important;}
  .hsv-btn.wrong{border-color:var(--red)!important;color:var(--red)!important;background:rgba(255,112,112,.12)!important;}
  /* Feedback */
  .fb{font-size:.78rem;margin-top:.3rem;padding:.35rem .6rem;border-radius:5px;display:none;}
  .fb.show{display:block;}
  .fb.ok{background:rgba(52,214,114,.12);color:var(--green);border:1px solid rgba(52,214,114,.25);}
  .fb.err{background:rgba(255,112,112,.12);color:var(--red);border:1px solid rgba(255,112,112,.25);}
  /* Submit / Result */
  .submit-wrap{text-align:center;margin:2rem 0;}
  .submit-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:1rem 2.5rem;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
  .submit-btn:hover{opacity:.88;}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center;margin-bottom:1.2rem;}
  .rb-item{background:var(--surface2);border-radius:8px;padding:.8rem;text-align:center;}
  .rb-num{font-size:1.3rem;font-weight:800;color:var(--accent);}
  .rb-lab{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
  .result-score{font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .cta-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;}
  .cta-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:.8rem 1.8rem;border-radius:10px;font-weight:700;font-size:.92rem;text-decoration:none;}
  .cta-ghost{border:1px solid var(--border);color:var(--muted);padding:.8rem 1.6rem;border-radius:10px;font-weight:600;cursor:pointer;background:none;font-size:.92rem;}
  .cta-ghost:hover{border-color:var(--accent);color:var(--accent);}
  #results{display:none;}
  #gate-wrap{display:none;max-width:440px;margin:4rem auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;text-align:center;}

  /* ── YAN YANA DÜZEN ── */
  .split-layout{display:grid;grid-template-columns:1.15fr 1fr;gap:1.6rem;align-items:start;margin-bottom:1.2rem;}
  .split-questions{display:flex;flex-direction:column;gap:.6rem;}
  .split-ref{
    position:sticky;top:68px;
    max-height:calc(100vh - 88px);
    overflow-y:auto;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1.1rem 1.2rem;
    word-break:normal;
    overflow-wrap:break-word;
    word-wrap:break-word;
  }
  .split-ref::-webkit-scrollbar{width:5px;}
  .split-ref::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .split-ref-title{font-size:.72rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.7rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}

  /* Match row split versiyonu */
  .match-row-split{display:flex;align-items:flex-start;gap:.6rem;padding:.7rem .9rem;background:var(--surface2);border-radius:8px;margin-bottom:.4rem;}
  .match-num-split{font-size:.85rem;font-weight:800;color:var(--accent);min-width:26px;padding-top:.25rem;flex-shrink:0;}
  .match-text-split{flex:1;font-size:.88rem;color:var(--text);line-height:1.65;}
  .match-sel-split{background:#f0f2ff;border:2px solid var(--border);color:#1a1a2e;border-radius:7px;padding:.38rem .7rem;font-size:.83rem;outline:none;cursor:pointer;width:100%;font-weight:600;margin-top:.5rem;}
  .match-sel-split:focus{border-color:var(--accent);}
  .match-sel-split.correct{border-color:var(--green);background:#dcfce7;color:#166534;}
  .match-sel-split.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b;}

  /* Ref içerik */
  .ref-item{padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:.84rem;line-height:1.6;color:var(--text);word-break:normal;overflow-wrap:anywhere;}
  .ref-item:last-child{border-bottom:none;}
  .ref-key{font-size:.76rem;font-weight:800;color:var(--accent);margin-bottom:.2rem;}
  .ref-text-block{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;font-size:.88rem;line-height:1.78;color:var(--text);white-space:pre-wrap;word-break:normal;overflow-wrap:break-word;}

  @media(max-width:900px){
    .split-layout{grid-template-columns:1fr;}
    .split-ref{position:static;max-height:none;}
    header{padding:.8rem 1rem;}
    .wrap{padding:1.2rem;}
    .section-card{padding:1.2rem;}
  }
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="PrufReady" style="height:60px;display:block;"/>
  <a href="dashboard.html" class="back-link" id="hdr-back">← Profile Dön</a>
</header>

<div id="mode-banner" class="mode-banner" style="display:none;"></div>

<div id="gate-wrap">
  <div style="font-size:2.5rem;margin-bottom:.8rem;">⚠️</div>
  <div id="gate-title" style="font-size:1.1rem;font-weight:800;margin-bottom:.5rem;"></div>
  <div id="gate-text" style="font-size:.88rem;color:var(--muted);margin-bottom:1.5rem;"></div>
  <a href="dashboard.html" id="gate-back" style="display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:.8rem 1.8rem;border-radius:10px;font-weight:700;">Profile Dön</a>
</div>

<div id="exam-wrap" style="display:none;">
<div class="wrap">
  <div class="exam-header">
    <div class="badge" id="exam-badge"></div>
    <h1 id="exam-title"></h1>
    <p id="exam-sub" style="color:var(--muted);font-size:.9rem;margin-top:.3rem;"></p>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="progress-label" id="prog-label">0 / 0</div>

  <div id="question-area"></div>

  <div id="results">
    <div class="result-card">
      <div class="result-score" id="res-score"></div>
      <div id="res-label" style="font-size:1rem;color:var(--muted);margin-top:.5rem;"></div>
      <div id="res-breakdown" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.7rem;margin-top:1.4rem;"></div>
    </div>
    <div id="analysis-box" class="result-card" style="display:none;text-align:left;"></div>
  </div>

  <div class="submit-wrap" id="submit-wrap" style="display:none;">
    <button class="submit-btn" id="submit-btn" onclick="submitExam()">Bitir ve İncele →</button>
  </div>

  <div id="page-end-cta" style="display:none;text-align:center;margin:2rem 0;">
    <div class="cta-row">
      <a href="dashboard.html" class="cta-btn" id="cta-back">Profile Dön</a>
      <button class="cta-ghost" id="cta-retry" onclick="location.reload()">Tekrar Çöz</button>
    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
/* ── Dil (i18n) ── */
// Sınav ekranı her zaman Almanca (dil değişiminden etkilenmez)
const CUR_LANG = 'de';
const L = (de,en,tr) => de;
const TX = {
  back        : ()=>L('← Zum Profil','← Back to Profile','← Profile Dön'),
  backPlain   : ()=>L('Zum Profil','Back to Profile','Profile Dön'),
  submit      : ()=>L('Beenden & auswerten →','Finish & review →','Bitir ve İncele →'),
  retry       : ()=>L('Erneut versuchen','Try again','Tekrar Çöz'),
  fragen      : ()=>L('Fragen','Questions','Sorular'),
  chooseHead  : ()=>L('— Überschrift wählen —','— Choose heading —','— Başlık seç —'),
  chooseAd    : ()=>L('— Anzeige —','— Ad —','— İlan —'),
  instrT1     : (a,b)=>L(`Lesen Sie die Überschriften und die Texte ${a}–${b}. Finden Sie für jeden Text die passende Überschrift. Sie können jede Überschrift nur einmal benutzen.`,`Read the headings and texts ${a}–${b}. Find the matching heading for each text. Each heading can only be used once.`,`Başlıkları ve ${a}–${b} metinlerini okuyun. Her metne uygun başlığı bulun. Her başlık yalnızca bir kez kullanılır.`),
  instrT2     : (a,b)=>L(`Lesen Sie den Text und die Aufgaben ${a}–${b}. Welche Lösung (a, b oder c) ist jeweils richtig?`,`Read the text and tasks ${a}–${b}. Which answer (a, b or c) is correct in each case?`,`Metni ve ${a}–${b} sorularını okuyun. Her soruda hangi cevap (a, b veya c) doğru?`),
  instrT3     : (a,b)=>L(`Lesen Sie die Situationen ${a}–${b} und die Anzeigen. Finden Sie für jede Situation die passende Anzeige. Sie können jede Anzeige nur einmal benutzen. Wenn Sie keine passende Anzeige finden, markieren Sie X.`,`Read situations ${a}–${b} and the ads. Find the matching ad for each situation. Each ad can only be used once. If there is no matching ad, mark X.`,`${a}–${b} durumlarını ve ilanları okuyun. Her duruma uygun ilanı bulun. Her ilan yalnızca bir kez kullanılır. Uygun ilan yoksa X işaretleyin.`),
  instrSPB1   : (a,b)=>L(`Lesen Sie den Text und schließen Sie die Lücken ${a}–${b}. Welche Lösung (a, b oder c) ist jeweils richtig?`,`Read the text and fill the gaps ${a}–${b}. Which answer (a, b or c) is correct in each case?`,`Metni okuyun ve ${a}–${b} boşluklarını doldurun. Her boşlukta hangi cevap (a, b veya c) doğru?`),
  instrSPB2   : (a,b)=>L(`Lesen Sie den Text und schließen Sie die Lücken ${a}–${b}. Benutzen Sie die Wörter a–o. Jedes Wort können Sie nur einmal benutzen.`,`Read the text and fill the gaps ${a}–${b}. Use the words a–o. Each word can only be used once.`,`Metni okuyun ve ${a}–${b} boşluklarını doldurun. a–o kelimelerini kullanın. Her kelime yalnızca bir kez kullanılır.`),
};

// Statik arayüz metinlerini dile göre ayarla
(function(){
  const set=(id,txt)=>{ const el=document.getElementById(id); if(el) el.textContent=txt; };
  set('hdr-back', TX.back());
  set('gate-back', TX.backPlain());
  set('submit-btn', TX.submit());
  set('cta-back', TX.backPlain());
  set('cta-retry', TX.retry());
})();

const params    = new URLSearchParams(location.search);
const MODULE    = params.get('module') || '';   // B1_LSV | B1_SPB | B1_LSV_T1 | ...
const SET_NUM   = parseInt(params.get('set'))||1;
const MODE      = params.get('mode') || 'exam';
const isStudy   = MODE === 'study';
const MODUL_KEY = 'examready_module_sets_v1';

/* ── Veri yükle (Supabase varsa oradan, yoksa localStorage) ── */
async function getAllSetsAsync() {
  if (USE_SUPABASE) {
    try {
      const sets = await sbLoadModuleSets();
      localStorage.setItem(MODUL_KEY, JSON.stringify(sets));  // offline cache
      return sets;
    } catch(e) { console.error('Supabase yüklenemedi:', e); }
  }
  return getAllSets();
}
function getAllSets() {
  try { return JSON.parse(localStorage.getItem(MODUL_KEY)||'{}'); } catch(e){ return {}; }
}

/* ──────────────────────────────────────────────────
   BÖLÜM NUMARALANDIRMASI
   LSV T1: 1-5 | T2: 6-10 | T3: 11-20
   SPB T1: 21-30 | T2: 31-40
────────────────────────────────────────────────── */
const NUM = {
  'B1_LSV_T1': { start:1,  count:5  },
  'B1_LSV_T2': { start:6,  count:5  },
  'B1_LSV_T3': { start:11, count:10 },
  'B1_SPB_T1': { start:21, count:10 },
  'B1_SPB_T2': { start:31, count:10 },
  'B1_HSV_T1': { start:41, count:5  },
  'B1_HSV_T2': { start:46, count:10 },
  'B1_HSV_T3': { start:56, count:5  },
};

/* ── Soru sayacı ── */
let totalQ = 0;
let answeredCount = 0;
const answered = {};

function markAnswered(id) {
  if (!answered[id]) { answered[id]=true; answeredCount++; updateProg(); }
}
function updateProg() {
  const pct = totalQ>0 ? Math.round(answeredCount/totalQ*100) : 0;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-label').textContent=answeredCount+' / '+totalQ;
}

/* ─────────────────────────────────────────────────
   RENDER: LSV T1 — Sorular solda, Başlıklar sağda sticky
──────────────────────────────────────────────────*/
function renderLSVT1(content, startQ) {
  const {texts, headings} = content;
  const validHeadings = Object.entries(headings).filter(([,v])=>v);
  const headOpts = validHeadings.map(([l,v])=>`<option value="${l}">${l.toUpperCase()}) ${v}</option>`).join('');

  // SOL: Her metin + yanıt dropdown'ı
  const questionRows = texts.map((t,i)=>{

   RENDER: HSV — audio + Richtig/Falsch sorular

// ── Standart Hören ses anahtarları (seviyeye göre: b1 / a1) ──
const HSV_LEVEL = (MODULE.split('_')[0] || 'B1').toLowerCase();   // 'b1' | 'a1'
const _sk = (sfx) => `std_${HSV_LEVEL}_${sfx}`;                    // ör: std_b1_t1_intro
// Full modeltest mi? (mode=full → Teil'ler otomatik ilerler, durdurma yok)
const HSV_FULL = (typeof MODE!=='undefined' && MODE==='full');
const HSV_TEILS = [];   // render sırasına göre Teil listesi (otomatik geçiş için)
function _audUrl(key){ return (key && typeof sbGetAudioUrl==='function') ? sbGetAudioUrl(key) : null; }

// Bir Teil için çalma listesi — horen.xlsx kodlamasına birebir uygun.
// A() = standart/kodlu ya da set-özel ses; W() = o kayıttan sonra beklenecek saniye.
function buildHSVSeq(content, teilNo){
  const seq=[];
  const A=(key,label)=>{ const u=_audUrl(key); if(u) seq.push({audio:u,label}); };
  const W=(s)=>seq.push({wait:s});
  if(teilNo===1){
    A(_sk('t1_1_1'),'Einführung'); W(30);                      // 1.1
    A(_sk('t1_1_2'),'Hören Sie nun die Interviews.'); W(5);    // 1.2
    A(content.interviewKey,'Interview'); W(5);                 // (manuel) Interview Giriş
    const qWait=[10,10,10,10,15];                              // Soru 51..55 sonrası bekleme
    (content.questions||[]).forEach((q,idx)=>{
      const num=41+idx;                                        // 41..45
      A(_sk('t1_'+num),'Nummer '+num); W(5);                   // 1.51..1.55
      A(q.audioKey,'Hörtext '+(idx+1)); W(qWait[idx]!=null?qWait[idx]:10);
    });
  } else if(teilNo===2){
    A(_sk('t2_1'),'Einführung'); W(60);                        // 2.1
    A(_sk('t2_2'),'Hören Sie jetzt das Gespräch.'); W(5);      // 2.2
    A(content.audioKey,'Gespräch'); W(5);                      // (manuel) içerik
    A(_sk('t2_3'),'Noch einmal.'); W(5);                       // 2.3
    A(content.audioKey,'Gespräch (Wiederholung)'); W(10);      // içerik tekrar
  } else {
    A(_sk('t3_1'),'Einführung'); W(5);                         // 3.1
    (content.questions||[]).forEach((q,idx)=>{
      const num=56+idx;                                        // 56..60
      if(idx>0){ A(_sk('t3_'+num),'Aufgabe '+num); W(5); }     // 3.4..3.7 (56 için yok — giriş kapsıyor)
      A(_sk('t3_2'),'Hören Sie jetzt den Text.'); W(5);        // 3.2
      A(q.audioKey,'Hörtext '+(idx+1)); W(5);                  // (manuel) içerik
      A(_sk('t3_3'),'Noch einmal.'); W(5);                     // 3.3
      A(q.audioKey,'Hörtext '+(idx+1)+' (Wiederholung)'); W(5);// içerik tekrar
    });
  }
  return seq;
}

const HSV_SEQ = {};

/* ── FULL modeltest: sıralı otomatik motor (durdurma/seek yok) ── */
const HSV_STATE = {};
function startHSV(teil){
  const seq=HSV_SEQ[teil]; if(!seq||!seq.length) return;
  const btn=document.getElementById('hsv-start-'+teil);
  const audio=document.getElementById('hsvpl-'+teil);
  const status=document.getElementById('hsv-status-'+teil);
  if(btn) btn.style.display='none';
  const st = HSV_STATE[teil] = { audio, timer:null, i:0 };
  function step(){
    if(st.i>=seq.length){
      if(status) status.textContent='✅ Hörverstehen beendet.';
      if(HSV_FULL){ const idx=HSV_TEILS.indexOf(teil); const next=HSV_TEILS[idx+1]; if(next!=null) startHSV(next); }
      return;
    }
    const s=seq[st.i++];
    if(s.audio){
      if(status) status.textContent='🔊 '+(s.label||'Wiedergabe…');
      audio.src=s.audio; audio.onended=step;
      audio.play().catch(()=>{ st.timer=setTimeout(step,500); });
    } else {
      let left=s.wait;
      if(status) status.textContent='⏳ '+left+' s';
      st.timer=setInterval(()=>{ left--; if(left<=0){clearInterval(st.timer); step();} else if(status) status.textContent='⏳ '+left+' s'; },1000);
    }
  }
  step();
}

/* ── PARTIAL: tüm segmentleri tek sese birleştir → native bar (seek/duraklat/devam) ── */
function encodeWAV(buffer){
  const numCh=buffer.numberOfChannels, len=buffer.length, sr=buffer.sampleRate;
  const blockAlign=numCh*2, dataLen=len*blockAlign;
  const ab=new ArrayBuffer(44+dataLen), view=new DataView(ab);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,'RIFF'); view.setUint32(4,36+dataLen,true); ws(8,'WAVE'); ws(12,'fmt ');
  view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,numCh,true);
  view.setUint32(24,sr,true); view.setUint32(28,sr*blockAlign,true); view.setUint16(32,blockAlign,true); view.setUint16(34,16,true);
  ws(36,'data'); view.setUint32(40,dataLen,true);
  let off=44; const chans=[]; for(let c=0;c<numCh;c++) chans.push(buffer.getChannelData(c));
  for(let i=0;i<len;i++){ for(let c=0;c<numCh;c++){ let v=Math.max(-1,Math.min(1,chans[c][i])); view.setInt16(off, v<0?v*0x8000:v*0x7FFF, true); off+=2; } }
  return new Blob([view],{type:'audio/wav'});
}
async function buildConcatBlob(seq){
  const AC=window.AudioContext||window.webkitAudioContext;
  const tmp=new AC();
  const items=[]; let total=0, okCount=0;
  for(const s of seq){
    if(s.audio){
      try{
        const r=await fetch(s.audio);
        if(!r.ok) throw new Error('HTTP '+r.status);
        const a=await r.arrayBuffer();
        const b=await tmp.decodeAudioData(a);
        items.push({buf:b}); total+=b.duration; okCount++;
      }catch(err){ console.warn('HSV segment atlandı:', s.audio, err && err.message); }
    } else {
      const w=s.wait; items.push({sil:w}); total+=w;   // gerçek bekleme süreleri (Excel'deki gibi)
    }
  }
  if(tmp.close){ try{ tmp.close(); }catch(e){} }
  if(okCount===0) throw new Error('no-audio');
  const sr=44100;
  const off=new OfflineAudioContext(1, Math.max(1,Math.ceil(total*sr)), sr);
  let t=0;
  items.forEach(it=>{ if(it.sil){ t+=it.sil; } else { const src=off.createBufferSource(); src.buffer=it.buf; src.connect(off.destination); src.start(t); t+=it.buf.duration; } });
  const rendered=await off.startRendering();
  return encodeWAV(rendered);
}
async function prepareHSVBar(teil){
  const btn=document.getElementById('hsv-load-'+teil);
  const status=document.getElementById('hsv-status-'+teil);
  const audio=document.getElementById('hsvpl-'+teil);
  if(btn){ btn.disabled=true; btn.textContent='⏳ wird geladen…'; }
  if(status) status.textContent='';
  try{
    const blob=await buildConcatBlob(HSV_SEQ[teil]);
    audio.src=URL.createObjectURL(blob);
    audio.style.display='block';
    if(btn) btn.style.display='none';
    audio.play().catch(()=>{ if(status) status.textContent='▶ Zum Abspielen auf Play tippen.'; });
  }catch(e){
    console.error('HSV bar hazırlanamadı:', e);
    if(btn){ btn.disabled=false; btn.textContent='🎧 Hören laden'; btn.style.display='inline-block'; }
    if(status) status.textContent = (e && e.message==='no-audio')
      ? '⚠ Für diesen Teil wurden noch keine Audios hochgeladen.'
      : '⚠ Audio konnte nicht geladen werden (Netzwerk/CORS).';
  }
}

function renderHSV(content, startQ, teilNo) {
  const {questions} = content;
  HSV_SEQ[teilNo] = buildHSVSeq(content, teilNo);
  const isFirst = HSV_TEILS.length === 0;
  HSV_TEILS.push(teilNo);
  const hasAudio = HSV_SEQ[teilNo].some(s=>s.audio);

  let controlsHTML;
  if (HSV_FULL) {
    // Full modeltest: otomatik motor; sadece ilk Teil'de başlat, durdurma/seek yok
    const startBtn = isFirst
      ? `<button id="hsv-start-${teilNo}" onclick="startHSV(${teilNo})" style="background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.55rem 1.3rem;border-radius:9px;font-weight:700;font-size:.88rem;cursor:pointer;">▶ Hören starten</button>`

    controlsHTML = `<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">

      <audio id="hsvpl-${teilNo}" style="display:none;"></audio>`;
  } else {
    // Partial (çalışma): birleşik ses + sürüklenebilir bar (seek / duraklat / devam)
    controlsHTML = `<div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        <span class="audio-label">🎧 Teil ${teilNo}</span>
        <button id="hsv-load-${teilNo}" onclick="prepareHSVBar(${teilNo})" style="background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.55rem 1.3rem;border-radius:9px;font-weight:700;font-size:.88rem;cursor:pointer;">🎧 Hören laden</button>
        <span id="hsv-status-${teilNo}" style="font-size:.82rem;color:var(--muted);"></span>

  const audioHTML = hasAudio
    ? `<div class="audio-block" style="flex-direction:column;align-items:stretch;gap:.7rem;">${controlsHTML}</div>`
    : '<div style="color:var(--yellow);font-size:.8rem;margin-bottom:.8rem;">⚠ Ses dosyası yok</div>';

  const rows = (questions||[]).map((q,i)=>{
    const qn=startQ+i; const id=`hsv-${qn}`;
    totalQ++;
    return `<div class="hsv-q">
      <div style="display:flex;gap:.7rem;align-items:flex-start;">

            <button class="hsv-btn" id="${id}-R" onclick="selHSV('${id}','R')">✓ Richtig</button>
            <button class="hsv-btn" id="${id}-F" onclick="selHSV('${id}','F')">✗ Falsch</button>
          </div>
          <div class="fb" id="${id}-fb"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="section-card">
    <div class="section-tag">Hörverstehen · Teil ${teilNo} · ${TX.fragen()} ${startQ}–${startQ+questions.length-1}</div>
    <h2>Hörverstehen – Teil ${teilNo}</h2>

// Kaydedilen yapıları submit için tut
const renderedParts = [];

const PART_LABEL = {
  'lsv-t1':'Leseverstehen Teil 1', 'lsv-t2':'Leseverstehen Teil 2', 'lsv-t3':'Leseverstehen Teil 3',
  'spb-t1':'Sprachbausteine Teil 1', 'spb-t2':'Sprachbausteine Teil 2'
};
function submitExam() {
  let correct = 0;
  const analysis = [];   // { qn, ok, yourAns, correctText, exp }
  const breakdown = [];  // { label, pc, pt }

  renderedParts.forEach(p => {
    const {type, content, startQ} = p;
    const _s0 = analysis.length;
    if (type === 'lsv-t1') {
      content.texts.forEach((t,i)=>{
        const qn=startQ+i; const id=`lsv1-${qn}`;
        const sel=document.getElementById(id); const your=sel?.value||'';
        const ok=your===t.answer; if(ok) correct++;
        if(sel){sel.className='match-sel-split'+(ok?' correct':' wrong');sel.disabled=true;}
        analysis.push({qn, ok, yourAns: your?your.toUpperCase():'—',
          correctText:`'${t.answer.toUpperCase()}': ${content.headings[t.answer]||''}`, exp:t.exp||''});
      });
    } else if (type === 'lsv-t2') {
      content.questions.forEach((q,i)=>{
        const qn=startQ+i; const id=`lsv2-${qn}`;
        const sel=mcAnswers[id]||''; const ok=sel===q.answer; if(ok) correct++;
        ['a','b','c'].forEach(k=>{
          const btn=document.getElementById(id+'-'+k);
          if(!btn) return; btn.onclick=null; btn.style.cursor='default';
          if(k===q.answer) btn.classList.add('correct');
          else if(k===sel) btn.classList.add('wrong');
        });
        analysis.push({qn, ok, yourAns: sel?sel.toUpperCase():'—',
          correctText:`'${q.answer.toUpperCase()}': ${q[q.answer]||''}`, exp:q.exp||''});
      });
    } else if (type === 'lsv-t3') {
      content.situations.forEach((s,i)=>{
        const qn=startQ+i; const id=`lsv3-${qn}`;
        const sel=document.getElementById(id); const your=sel?.value||'';
        const ok=your===s.answer; if(ok) correct++;
        if(sel){sel.className='match-sel-split'+(ok?' correct':' wrong');sel.disabled=true;}
        const cl = s.answer==='x'?'X (Keine)':s.answer.toUpperCase();
        analysis.push({qn, ok, yourAns: your?(your==='x'?'X':your.toUpperCase()):'—',
          correctText:`'${cl}'`, exp:s.exp||''});
      });
    } else if (type === 'spb-t1') {
      content.gaps.forEach((g,i)=>{
        const qn=startQ+i; const id=`spb1-${qn}`;
        const sel=document.getElementById(id); const your=sel?.value||'';
        const ok=your===g.answer; if(ok) correct++;
        if(sel){sel.className='gap-sel'+(ok?' correct':' wrong');sel.disabled=true;}
        analysis.push({qn, ok, yourAns: your?your.toUpperCase():'—',
          correctText:`'${g.answer.toUpperCase()}': ${g[g.answer]||''}`, exp:g.exp||''});
      });
    } else if (type === 'spb-t2') {
      (content.gaps||[]).forEach((g,i)=>{
        const qn=startQ+i; const id=`spb2-${qn}`;
        const sel=document.getElementById(id); const your=sel?.value||'';
        const ok=your===g.answer; if(ok) correct++;
        if(sel){sel.className='gap-sel'+(ok?' correct':' wrong');sel.disabled=true;}
        analysis.push({qn, ok, yourAns: your?your.toUpperCase():'—',
          correctText:`'${g.answer.toUpperCase()}': ${(content.options&&content.options[g.answer])||''}`, exp:g.exp||''});
      });
    } else if (type === 'hsv') {
      content.questions.forEach((q,i)=>{
        const qn=startQ+i; const id=`hsv-${qn}`;
        const sel=hsvAnswers[id]; const ok=sel===q.answer; if(ok) correct++;
        const R=document.getElementById(id+'-R'), F=document.getElementById(id+'-F');
        [R,F].forEach(b=>{ if(b){b.onclick=null;b.style.cursor='default';} });
        if(q.answer==='R'){ R.classList.add('correct'); if(sel==='F') F.classList.add('wrong'); }
        else { F.classList.add('correct'); if(sel==='R') R.classList.add('wrong'); }
        analysis.push({qn, ok, yourAns: sel==='R'?'Richtig':sel==='F'?'Falsch':'—',
          correctText: q.answer==='R'?'Richtig':'Falsch', exp:q.exp||''});
      });
    }
    // Bölüm bazlı skor
    const items = analysis.slice(_s0);
    const label = PART_LABEL[type] || ('Hörverstehen Teil '+(p.teil||''));
    breakdown.push({ label, pc: items.filter(x=>x.ok).length, pt: items.length });
  });

  const pct=totalQ>0?Math.round(correct/totalQ*100):0;
  document.getElementById('res-score').textContent=correct+'/'+totalQ;
  document.getElementById('res-label').textContent=pct>=60?'🎉 Sehr gut!':pct>=40?'📚 Weiter üben.':'💪 Noch einmal versuchen.';

  // Bölüm bazlı skor kutuları
  document.getElementById('res-breakdown').innerHTML = breakdown.map(b=>
    `<div class="rb-item"><div class="rb-num">${b.pc}/${b.pt}</div><div class="rb-lab">${b.label}</div></div>`
  ).join('');

  // ── Fragen-Analyse und Erklärungen ──
  const rows = analysis.map(a=>{
    const head = a.ok
      ? `<div style="color:var(--green);font-weight:700;font-size:.9rem;">✓ Frage ${a.qn}</div>`
      : `<div style="color:var(--red);font-weight:700;font-size:.9rem;">✗ Frage ${a.qn} — Deine Antwort: ${a.yourAns}</div>`;
    const line = `<div style="font-size:.85rem;color:var(--muted);margin-top:.25rem;line-height:1.55;">Richtig ist ${a.correctText}${a.exp?' — '+a.exp:''}</div>`;
    return `<div style="padding:.7rem 0;border-bottom:1px dashed var(--border);">${head}${line}</div>`;
  }).join('');
  document.getElementById('analysis-box').innerHTML =
    `<h3 style="font-size:1rem;font-weight:800;margin-bottom:.8rem;">Fragen-Analyse und Erklärungen</h3>${rows}`;
  document.getElementById('analysis-box').style.display='block';

  document.getElementById('submit-wrap').style.display='none';
  document.getElementById('results').style.display='block';
  document.getElementById('page-end-cta').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ─────────────────────────────────────────────────
   INIT
──────────────────────────────────────────────────*/
(async function init(){
  // Mode banner — şimdilik devre dışı
  // const banner=document.getElementById('mode-banner');

  const all = await getAllSetsAsync();

  // Hangi bölümler yüklenecek?
  // B1_LSV → T1+T2+T3 birleşik
  // B1_SPB → T1+T2 birleşik
  // B1_LSV_T1/T2/T3 → sadece o bölüm (admin önizleme)
  let parts = [];
  if (MODULE === 'B1_LSV') {
    parts = [
      { key:'B1_LSV_T1', type:'lsv-t1',  startQ: NUM['B1_LSV_T1'].start },
      { key:'B1_LSV_T2', type:'lsv-t2',  startQ: NUM['B1_LSV_T2'].start },
      { key:'B1_LSV_T3', type:'lsv-t3',  startQ: NUM['B1_LSV_T3'].start },
    ];
  } else if (MODULE === 'B1_SPB') {
    parts = [
      { key:'B1_SPB_T1', type:'spb-t1', startQ: NUM['B1_SPB_T1'].start },
      { key:'B1_SPB_T2', type:'spb-t2', startQ: NUM['B1_SPB_T2'].start },
    ];
  } else if (MODULE === 'B1_HSV') {
    parts = [
      { key:'B1_HSV_T1', type:'hsv', startQ: NUM['B1_HSV_T1'].start, teil:1 },
      { key:'B1_HSV_T2', type:'hsv', startQ: NUM['B1_HSV_T2'].start, teil:2 },
      { key:'B1_HSV_T3', type:'hsv', startQ: NUM['B1_HSV_T3'].start, teil:3 },
    ];
  } else if (NUM[MODULE]) {
    // Tekli bölüm önizleme
    const structure = MODULE.includes('LSV_T1')?'lsv-t1':MODULE.includes('LSV_T2')?'lsv-t2':MODULE.includes('LSV_T3')?'lsv-t3':MODULE.includes('SPB_T1')?'spb-t1':MODULE.includes('SPB_T2')?'spb-t2':'hsv';
    const teilNo = MODULE.includes('_T1')?1:MODULE.includes('_T2')?2:3;
    parts = [{ key: MODULE, type: structure, startQ: NUM[MODULE].start, teil: teilNo }];
  } else {
    // Bilinmeyen modül
    document.getElementById('gate-title').textContent='Bilinmeyen modül';
    document.getElementById('gate-text').textContent='URL parametresi hatalı.';
    document.getElementById('gate-wrap').style.display='block';
    return;
  }

  // Her bölümü kontrol et
  for (const p of parts) {
    const setData = all[p.key]?.[SET_NUM];
    if (!setData?.hasContent) {
      document.getElementById('gate-title').textContent='İçerik bulunamadı';
      document.getElementById('gate-text').textContent=`${p.key} – Set ${SET_NUM} henüz eklenmemiş. Admin panelinden ekleyin.`;
      document.getElementById('gate-wrap').style.display='block';
      return;
    }
    p.content = setData.content;
  }

  // Başlık
  const moduleLabel = MODULE==='B1_LSV'?'Leseverstehen':MODULE==='B1_SPB'?'Sprachbausteine':MODULE==='B1_HSV'?'Hörverstehen':MODULE.replace('B1_','').replace('_',' ');
  document.getElementById('exam-badge').textContent = `${moduleLabel} · Set ${SET_NUM}`;
  document.getElementById('exam-title').textContent = moduleLabel;
  document.getElementById('exam-sub').textContent   = '';

  // Render
  let html = '';
  for (const p of parts) {
    renderedParts.push(p);
    if (p.type==='lsv-t1')      html += renderLSVT1(p.content, p.startQ);
    else if (p.type==='lsv-t2') html += renderLSVT2(p.content, p.startQ);
    else if (p.type==='lsv-t3') html += renderLSVT3(p.content, p.startQ);
    else if (p.type==='spb-t1') html += renderSPBT1(p.content, p.startQ);
    else if (p.type==='spb-t2') html += renderSPBT2(p.content, p.startQ);
    else if (p.type==='hsv')    html += renderHSV(p.content, p.startQ, p.teil);
  }

  document.getElementById('question-area').innerHTML = html;
  document.getElementById('exam-wrap').style.display='block';
  document.getElementById('submit-wrap').style.display='block';
  updateProg();
})();
</script>

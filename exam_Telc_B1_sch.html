<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PrufReady – Schreiben</title>
<link rel="icon" type="image/png" href="logo.png"/>
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#22c55e;--red:#f87171;--text:#e8eaf0;--muted:#8b90a7;--border:#2a2d3e;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  select,option{color:#1a1a2e;background:#f0f2ff;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(15,17,23,.96);position:sticky;top:0;z-index:100;}
  .logo{font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .back-link{font-size:.85rem;color:var(--muted);}
  .back-link:hover{color:var(--accent);}
  .wrap{max-width:1000px;margin:0 auto;padding:2rem;}
  .badge{display:inline-block;background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--accent);border-radius:20px;padding:.3rem .9rem;font-size:.78rem;font-weight:700;margin-bottom:.8rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.8rem;margin-bottom:1.2rem;}
  .tag{display:inline-block;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.2);color:var(--accent);border-radius:6px;padding:.2rem .7rem;font-size:.72rem;font-weight:700;margin-bottom:.8rem;}
  h1{font-size:clamp(1.4rem,3.5vw,2rem);font-weight:900;margin-bottom:.4rem;}
  .task-text{font-size:.95rem;line-height:1.75;color:var(--text);margin-bottom:1rem;white-space:pre-wrap;}
  .points-list{list-style:none;display:flex;flex-direction:column;gap:.35rem;margin-bottom:1.2rem;}
  .points-list li{font-size:.9rem;color:var(--text);padding-left:1.3rem;position:relative;}
  .points-list li:before{content:'▪';position:absolute;left:.2rem;color:var(--accent);}
  .ai-eval-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem;margin-top:.8rem;display:none;font-size:.87rem;line-height:1.7;color:var(--text);}
  .ai-eval-box.show{display:block;}
  .btn-evaluate{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border:none;padding:.65rem 1.3rem;border-radius:9px;font-weight:700;font-size:.88rem;cursor:pointer;}
  .btn-evaluate:hover{opacity:.88;}
  textarea.answer-box{width:100%;min-height:340px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.9rem 1rem;color:var(--text);font-size:.9rem;font-family:inherit;line-height:1.7;outline:none;resize:vertical;}
  textarea.answer-box:focus{border-color:var(--accent);}
  .word-count{font-size:.75rem;color:var(--muted);text-align:right;margin-top:.3rem;}
  .btn-row{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1rem;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.7rem 1.4rem;border-radius:9px;font-weight:700;font-size:.9rem;cursor:pointer;}
  .btn-ghost{border:1px solid var(--border);color:var(--muted);padding:.7rem 1.2rem;border-radius:9px;font-weight:600;font-size:.9rem;background:none;cursor:pointer;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .example-box{background:var(--surface2);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:1rem 1.1rem;font-size:.88rem;line-height:1.75;color:var(--text);display:none;white-space:pre-wrap;}
  .mode-banner{padding:.45rem 2rem;font-size:.78rem;text-align:center;font-weight:700;}
  .mode-study{background:rgba(34,197,94,.1);color:var(--green);border-bottom:1px solid rgba(34,197,94,.2);}
  .mode-exam{background:rgba(79,142,247,.08);color:var(--accent);border-bottom:1px solid rgba(79,142,247,.2);}
  #gate-wrap{display:none;max-width:440px;margin:4rem auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;text-align:center;}
  .empty-state{text-align:center;padding:3rem;color:var(--muted);}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="PrufReady" style="height:60px;display:block;"/>
  <a href="dashboard.html" class="back-link">← Zum Profil</a>
</header>

<div id="gate-wrap">
  <div style="font-size:2.5rem;margin-bottom:.8rem;">🔒</div>
  <div id="gate-title" style="font-size:1.1rem;font-weight:800;margin-bottom:.5rem;"></div>
  <div id="gate-text" style="font-size:.88rem;color:var(--muted);margin-bottom:1.5rem;"></div>
  <a id="gate-cta" href="register.html" style="display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:.8rem 1.8rem;border-radius:10px;font-weight:700;font-size:.92rem;"></a>
</div>

<div id="mode-banner" class="mode-banner" style="display:none;"></div>

<div id="exam-wrap" style="display:none;">
  <div class="wrap">
    <div style="text-align:center;margin-bottom:2rem;">
      <div class="badge">Subtest: Schreiben</div>
      <h1>Schreiben – Aufgabe</h1>
      <p style="color:var(--muted);font-size:.92rem;">Eine Schreibaufgabe — laden Sie jederzeit eine neue zufällige Aufgabe.</p>
    </div>

    <div id="question-area"></div>

    <div style="text-align:center;margin-top:1.5rem;">
      <button class="btn-ghost" onclick="loadRandom()">🔀 Neue Zufallsaufgabe</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
const SESSION_KEY = 'examready_session_v1';
const SCH_KEY     = 'examready_schreiben_v1';

function getSession() {
  try { const s=JSON.parse(localStorage.getItem(SESSION_KEY)); return (s&&s.role==='student')?s:null; } catch(e){return null;}
}
function getMode() {
  return new URLSearchParams(location.search).get('mode') || 'exam';
}

async function loadPoolAsync() {
  if (USE_SUPABASE) {
    try {
      const rows = await sbLoadSchreiben();
      const list = rows.map(r => ({
        id: r.id, type: r.type, level: r.level, setNo: r.set_no,
        task: r.task, points: r.points || [], example: r.example, criteria: r.criteria
      }));
      localStorage.setItem(SCH_KEY, JSON.stringify(list));
      return list;
    } catch(e) { console.error('Supabase schreiben yüklenemedi:', e); }
  }
  try { return JSON.parse(localStorage.getItem(SCH_KEY)||'[]'); } catch(e){ return []; }
}

let currentQ = null;
let poolCache = [];
// Tam deneme sınavında (mode=full) örnek yanıt/kriter gösterilmez.
// Tek başına (modül/partial) çözümde gösterilir.
const isFullExam = getMode() === 'full';
const showHelpers = !isFullExam;

async function loadRandom() {
  if (!poolCache.length) poolCache = await loadPoolAsync();
  if (!poolCache.length) {
    document.getElementById('question-area').innerHTML = '<div class="empty-state">📭 Noch keine Aufgaben vorhanden.</div>';
    return;
  }
  currentQ = poolCache[Math.floor(Math.random() * poolCache.length)];
  renderQ(currentQ);
}

// Kullanıcı adını görev/örnek metnindeki yer tutuculara yerleştir
function personalize(txt) {
  if (!txt) return txt;
  const name = (getSession()?.name || '').trim();
  if (!name) return txt;
  return txt.replace(/\[\s*(user\s*name|username|name|vorname|isim|ad soyad|ad)\s*\]/gi, name);
}

// telc B1 Schreiben standart yönergeleri (sabit)
const SCH_INTRO  = 'Antworten Sie auf die E-Mail. Schreiben Sie etwas zu allen vier Punkten:';
const SCH_OUTRO  = 'Überlegen Sie sich vor dem Schreiben eine passende Reihenfolge der Punkte, einen passenden Betreff, eine passende Anrede, Einleitung und einen passenden Schluss.';

function renderQ(q) {
  const pointsHTML = (q.points||[]).map(p=>`<li>${personalize(p)}</li>`).join('');
  const exampleHTML = q.example && showHelpers
    ? `<div style="margin-top:1rem;">
        <button class="btn-ghost" onclick="toggleExample()" id="ex-btn" style="font-size:.8rem;padding:.4rem .9rem;">💡 Musterlösung anzeigen</button>
        <div class="example-box" id="example-box">${personalize(q.example)}</div>
       </div>` : '';
  // Standart yönergeli maddeler bloğu (4 madde + üst/alt sabit ibareler)
  const pointsBlock = pointsHTML ? `
    <div style="background:var(--surface2);border-radius:8px;padding:1rem 1.1rem;margin-bottom:1.2rem;">
      <div style="font-style:italic;font-size:.87rem;color:var(--text);margin-bottom:.7rem;">${SCH_INTRO}</div>
      <ul class="points-list" style="margin-bottom:.9rem;">${pointsHTML}</ul>
      <div style="font-style:italic;font-size:.83rem;color:var(--muted);border-top:1px solid var(--border);padding-top:.7rem;">${SCH_OUTRO}</div>
    </div>` : '';

  document.getElementById('question-area').innerHTML = `
    <div class="card">
      <div class="tag">${q.type==='brief'?'Brief':q.type==='email'?'E-Mail':'Notiz'} · ${q.level}${q.setNo?` · Set ${q.setNo}`:''}</div>
      <div class="task-text">${personalize(q.task)}</div>
      ${pointsBlock}
    </div>
    <div class="card">
      <div style="font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:.5rem;">Schreiben Sie hier Ihre Antwort:</div>
      <textarea class="answer-box" id="answer-box" oninput="updateWC()" placeholder="Hier schreiben Sie Ihren Text..."></textarea>
      <div class="word-count" id="wc">0 Wörter</div>
      <div class="btn-row">
        <button class="btn-evaluate" onclick="evaluateAnswer()">🤖 Auswerten</button>
        <button class="btn-ghost" onclick="clearAnswer()">Löschen</button>
      </div>
      <div class="ai-eval-box" id="ai-eval-box"></div>
      ${exampleHTML}
    </div>`;
}

function evaluateAnswer() {
  const answer = document.getElementById('answer-box')?.value?.trim();
  const box = document.getElementById('ai-eval-box');
  if (!answer) {
    box.innerHTML = '<span style="color:var(--muted);">Bitte schreiben Sie zuerst einen Text.</span>';
    box.classList.add('show'); return;
  }
  // AI bağlantısı ileriki adımda eklenecek
  box.innerHTML = `<div style="color:var(--muted);font-size:.84rem;text-align:center;padding:.5rem 0;">
    <div style="font-size:1.2rem;margin-bottom:.4rem;">🤖</div>
    Die KI-Auswertung wird bald verfügbar sein. Dieser Bereich wird nach der API-Anbindung aktiv.
  </div>`;
  box.classList.add('show');
}

function updateWC() {
  const words = (document.getElementById('answer-box')?.value||'').trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wc').textContent = words + ' Wörter';
}
function clearAnswer() {
  const el = document.getElementById('answer-box');
  if (el) { el.value=''; updateWC(); }
}
function toggleExample() {
  const box = document.getElementById('example-box');
  const btn = document.getElementById('ex-btn');
  const show = box.style.display==='block';
  box.style.display = show ? 'none' : 'block';
  btn.textContent = show ? '💡 Musterlösung anzeigen' : '💡 Musterlösung ausblenden';
}

(function init(){
  const sess = getSession();
  if (!sess) {
    document.getElementById('gate-title').textContent='Anmeldung erforderlich';
    document.getElementById('gate-text').textContent='Bitte melden Sie sich mit Ihrem Konto an, um auf diesen Inhalt zuzugreifen.';
    document.getElementById('gate-cta').textContent='Anmelden →';
    document.getElementById('gate-cta').href='dashboard.html';
    document.getElementById('gate-wrap').style.display='block';
    return;
  }

  // Mode banner — şimdilik devre dışı

  document.getElementById('exam-wrap').style.display='block';
  loadRandom();
})();
</script>
</body>
</html>
